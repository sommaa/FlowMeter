name: Bug report
description: Report a problem with FlowMeter
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not** report security
        vulnerabilities here — see our [Security Policy](https://github.com/sommaa/FlowMeter/security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Upload '...'
        2. Load template '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FlowMeter version
      placeholder: "1.0.0-alpha"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running it?
      options:
        - Pre-built executable (release binary)
        - From source (development)
        - Docker
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste terminal output or attach screenshots. Logs auto-redact API keys, but double-check before posting.
      render: shell
